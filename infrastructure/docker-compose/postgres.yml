version: '3.7'
services:
  postgres:
    image: postgres:14
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - "./volumes/postgres/data:/var/lib/postgresql/data"
    networks:
      - ${GLOBAL_NETWORK:-food-ordering-system}
